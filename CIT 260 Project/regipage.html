<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="schedule-styles.css" rel="stylesheet" type="text/css">
  <title>CSN — Schedule Your Exam</title>
</head>
<body>
 
  <!-- Top blue header bar -->
  <header id="page-header">
    <h1 id="title">Please Schedule Your Exam</h1>
  </header>
 
  <main>
 
    <!-- LEFT: Scheduling Form -->
    <div id="schedule-card">
 
      <div class="form-row">
        <div class="form-group">
          <label for="time">Time:</label>
          <input type="time" id="time" name="time" />
        </div>
        <div class="form-group">
          <label for="date">Date:</label>
          <input type="date" id="date" name="date" />
        </div>
      </div>
 
      <div class="form-group">
        <label for="location">Location:</label>
        <input type="text" id="location" name="location" placeholder="e.g. Henderson Campus" />
      </div>
 
      <div class="form-row">
        <div class="form-group">
          <label for="building">Building:</label>
          <input type="text" id="building" name="building" placeholder="e.g. Building A" />
        </div>
        <div class="form-group">
          <label for="room">Room Number:</label>
          <input type="text" id="room" name="room" placeholder="e.g. 101" />
        </div>
      </div>
 
      <div class="form-row">
        <div class="form-group">
          <label for="subject">Subject:</label>
          <input type="text" id="subject" name="subject" placeholder="e.g. ENG 101" />
        </div>
        <div class="form-group">
          <label for="proctor">Proctor:</label>
          <input type="text" id="proctor" name="proctor" placeholder="e.g. Mr. Smith" />
        </div>
      </div>
 
      <div class="form-group">
        <button type="button" id="submitbutton">Schedule Exam</button>
      </div>
 
    </div>
    <!-- END schedule-card -->
 
    <!-- RIGHT: Scheduled Exams Viewer -->
    <div id="scheduled-exams">
 
      <h2 id="exams-heading">Your Scheduled Exams</h2>
 
      <!-- 3 exam slots — JS will populate these later -->
      <div class="exam-slot" id="exam-slot-1">
        <div class="exam-info">
          <span class="exam-label">Exam 1</span>
          <span class="exam-detail">No exam scheduled</span>
        </div>
        <button type="button" class="cancel-btn" disabled>Cancel</button>
      </div>
 
      <div class="exam-slot" id="exam-slot-2">
        <div class="exam-info">
          <span class="exam-label">Exam 2</span>
          <span class="exam-detail">No exam scheduled</span>
        </div>
        <button type="button" class="cancel-btn" disabled>Cancel</button>
      </div>
 
      <div class="exam-slot" id="exam-slot-3">
        <div class="exam-info">
          <span class="exam-label">Exam 3</span>
          <span class="exam-detail">No exam scheduled</span>
        </div>
        <button type="button" class="cancel-btn" disabled>Cancel</button>
      </div>
 
      <!-- Logout button pinned to bottom of panel -->
      <div id="logout-row">
        <button type="button" id="logoutbutton">Log Out</button>
      </div>
 
    </div>
    <!-- END scheduled-exams -->
 
  </main>
 
  <footer id="page-footer">
    <span>College of Southern Nevada</span>
  </footer>
 
  <script>
    // Handle logout button
    document.getElementById('logoutbutton').addEventListener('click', () => {
      fetch('http://localhost:5000/api/logout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include'
      })
      .then(resp => resp.json())
      .then(data => {
        if (data.success) {
          // Clear local credentials
          localStorage.removeItem('username');
          localStorage.removeItem('user_id');
          // Redirect to login page
          window.location.href = 'login.html';
        } else {
          alert('Error: ' + data.message);
        }
      })
      .catch(err => {
        console.error(err);
        alert('Network or server error');
      });
    });
    
    // TODO: wire up to Flask backend
    // submitbutton  → POST   /api/schedule  → refresh exam slots
    // cancel-btn    → DELETE /api/schedule/:id → refresh exam slots
  </script>
 
</body>
</html>
