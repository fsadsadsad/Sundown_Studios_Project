<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="schedule-styles.css" rel="stylesheet" type="text/css">
  <title>CSN — Schedule Your Exam</title>
</head>
<body>
 
  <!-- Top blue header bar -->
  <header id="page-header">
    <h1 id="title">Please Schedule Your Exam</h1>
  </header>
 
  <main>
 
    <!-- LEFT: Scheduling Form -->
    <div id="schedule-card">
 
      <div class="form-row">
        <div class="form-group">
          <label for="time">Time:</label>
          <input type="time" id="time" name="time" />
        </div>
        <div class="form-group">
          <label for="date">Date:</label>
          <input type="date" id="date" name="date" />
        </div>
      </div>
 
      <div class="form-group">
        <label for="location">Location:</label>
        <!--input type="text" id="location" name="location" placeholder="e.g. Henderson Campus" readonly/-->
        <select id="location" name="location" placeholder="e.g. Henderson Campus">
            <option value="Henderson">Henderson Campus</option>
            <option value="Charleston">Charleston Campus</option>
            <option value="North">North Las Vegas Campus</option>
        </select>
      </div>
 
      <div class="form-row">
        <div class="form-group">
          <label for="building">Building:</label>
          <input type="text" id="building" name="building" placeholder="e.g. Building A" readonly/>
        </div>
        <div class="form-group">
          <label for="room">Room Number:</label>
          <input type="text" id="room" name="room" placeholder="e.g. 101" readonly/>
        </div>
      </div>
 
      <div class="form-row">
        <div class="form-group">
          <label for="subject">Subject:</label>
          <!--input type="text" id="subject" name="subject" placeholder="e.g. ENG" /-->
        <div class="dropdown">
          <select id="subject" name="subject" placeholder="e.g. ENG">
            <option value="ENG">ENGLISH</option>
            <option value="ENG">MATH</option>
            <option value="ENG">BIOLOGY</option>
            <option value="ENG">HISTORY</option>
          </select>
        </div>
        </div>
        <div class="form-group">
          <label for="proctor">Proctor:</label>
          <input type="text" id="proctor" name="proctor" placeholder="e.g. Mr. Smith" readonly/>
        </div>
      </div>
 
      <div class="form-group">
        <button type="button" id="submitbutton">Schedule Exam</button>
      </div>
 
    </div>
    <!-- END schedule-card -->
 
    <!-- RIGHT: Scheduled Exams Viewer -->
    <div id="scheduled-exams">
 
      <h2 id="exams-heading">Your Scheduled Exams</h2>
 
      <!-- 3 exam slots — JS will populate these later -->
      <div class="exam-slot" id="exam-slot-1">
        <div class="exam-info">
          <span class="exam-label">Exam 1</span>
          <span class="exam-detail">No exam scheduled</span>
        </div>
        <button type="button" class="cancel-btn" disabled>Cancel</button>
      </div>
 
      <div class="exam-slot" id="exam-slot-2">
        <div class="exam-info">
          <span class="exam-label">Exam 2</span>
          <span class="exam-detail">No exam scheduled</span>
        </div>
        <button type="button" class="cancel-btn" disabled>Cancel</button>
      </div>
 
      <div class="exam-slot" id="exam-slot-3">
        <div class="exam-info">
          <span class="exam-label">Exam 3</span>
          <span class="exam-detail">No exam scheduled</span>
        </div>
        <button type="button" class="cancel-btn" disabled>Cancel</button>
      </div>
 
      <!-- Logout button pinned to bottom of panel -->
      <div id="logout-row">
        <button type="button" id="logoutbutton">Log Out</button>
      </div>
 
    </div>
    <!-- END scheduled-exams -->
 
  </main>
 
  <footer id="page-footer">
    <span>College of Southern Nevada</span>
  </footer>
 
  <script>
    // ── Helpers ────────────────────────────────────────────────────────────
    const userId = localStorage.getItem('user_id');

    function fmtTime(t) {
      // "HH:MM" → "h:MM AM/PM"
      const [h, m] = t.split(':').map(Number);
      const ampm = h >= 12 ? 'PM' : 'AM';
      const hr   = h % 12 || 12;
      return `${hr}:${String(m).padStart(2,'0')} ${ampm}`;
    }

    // ── Render exam slots ──────────────────────────────────────────────────
    function renderExams(exams) {
      for (let i = 1; i <= 3; i++) {
        const slot   = document.getElementById(`exam-slot-${i}`);
        const info   = slot.querySelector('.exam-info');
        const btn    = slot.querySelector('.cancel-btn');
        const exam   = exams[i - 1];

        if (exam) {
          slot.classList.add('filled');
          info.innerHTML = `
            <span class="exam-subject">${exam.subject}</span>
            <span class="exam-datetime">${exam.date} &nbsp;·&nbsp; ${fmtTime(exam.time)}</span>
            <span class="exam-location">${exam.location} — ${exam.building}, Room ${exam.room}</span>`;
          btn.disabled = false;
          btn.dataset.regId = exam.id;
        } else {
          slot.classList.remove('filled');
          info.innerHTML = `
            <span class="exam-label">Exam ${i}</span>
            <span class="exam-detail">No exam scheduled</span>`;
          btn.disabled = true;
          delete btn.dataset.regId;
        }
      }
    }

    // ── Load existing exams on page open ───────────────────────────────────
    function loadExams() {
      if (!userId) return;
      fetch(`http://localhost:5000/api/schedule?user_id=${userId}`)
        .then(r => r.json())
        .then(data => { if (data.success) renderExams(data.exams); })
        .catch(err => console.error('Could not load exams:', err));
    }

    loadExams();

    // ── Schedule exam ──────────────────────────────────────────────────────
    document.getElementById('submitbutton').addEventListener('click', () => {
      if (!userId) { alert('You are not logged in.'); return; }

      const date     = document.getElementById('date').value;
      const time     = document.getElementById('time').value;
      const location = document.getElementById('location').value;
      const building = document.getElementById('building').value;
      const room     = document.getElementById('room').value;
      const subject  = document.getElementById('subject').value;
      const proctor  = document.getElementById('proctor').value;

      if (!date || !time || !location || !subject) {
        alert('Please fill in Date, Time, Location, and Subject.');
        return;
      }

      fetch('http://localhost:5000/api/schedule', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: userId, date, time, location, building, room, subject, proctor })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          alert('Exam scheduled!');
          loadExams();
        } else {
          alert('Error: ' + data.message);
        }
      })
      .catch(err => { console.error(err); alert('Network or server error'); });
    });

    // ── Cancel exam (event delegation on all cancel buttons) ───────────────
    document.querySelectorAll('.cancel-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const regId = btn.dataset.regId;
        if (!regId || !userId) return;
        if (!confirm('Cancel this exam?')) return;

        fetch(`http://localhost:5000/api/schedule/${regId}`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: userId })
        })
        .then(r => r.json())
        .then(data => {
          if (data.success) { loadExams(); }
          else { alert('Error: ' + data.message); }
        })
        .catch(err => { console.error(err); alert('Network or server error'); });
      });
    });

    // ── Logout ─────────────────────────────────────────────────────────────
    document.getElementById('logoutbutton').addEventListener('click', () => {
      fetch('http://localhost:5000/api/logout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include'
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          localStorage.removeItem('username');
          localStorage.removeItem('user_id');
          window.location.href = 'login.html';
        } else {
          alert('Error: ' + data.message);
        }
      })
      .catch(err => { console.error(err); alert('Network or server error'); });
    });
  </script>
 
</body>
</html>
