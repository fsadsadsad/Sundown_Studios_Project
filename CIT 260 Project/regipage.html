<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="schedule-styles.css" rel="stylesheet" type="text/css">
  <title>CSN — Schedule Your Exam</title>
</head>
<body>
 
  <!-- Top blue header bar -->
  <header id="page-header">
    <h1 id="title">Please Schedule Your Exam</h1>
  </header>
 
  <main>
 
    <!-- LEFT: Scheduling Form -->
    <div id="schedule-card">
 
      <!-- 1. Class (Dropdown) with error handling -->
      <div id="class-group" class="form-group">
        <label for="class">Class:</label>
        <div class="dropdown">
          <select id="class" name="class">
            <option value="">Loading classes...</option>
          </select>
        </div>
        <span id="class-error" class="error-message"></span>
      </div>
 
      <!-- 2. Exam Name (Dropdown) - populated based on class selection -->
      <div id="exam-group" class="form-group">
        <label for="exam-name">Exam Name:</label>
        <select id="exam-name" name="exam-name" disabled>
          <option value="">Select a Class First</option>
        </select>
        <span id="exam-error" class="error-message"></span>
      </div>
 
      <!-- 3. Campus / Location (Dropdown) -->
      <div id="location-group" class="form-group">
        <label for="location">Campus / Location:</label>
        <select id="location" name="location" disabled>
            <option value="">Select an Exam First</option>
        </select>
        <span id="location-error" class="error-message"></span>
      </div>
 
      <!-- 4. Date (Dropdown) & 5. Time (Dropdown) -->
      <div class="form-row">
        <div id="date-group" class="form-group">
          <label for="date">Date:</label>
          <select id="date" name="date" disabled>
            <option value="">Select a Campus First</option>
          </select>
          <span id="date-error" class="error-message"></span>
        </div>
        <div id="time-group" class="form-group">
          <label for="time">Time:</label>
          <select id="time" name="time" disabled>
            <option value="">Select a Date First</option>
          </select>
          <span id="time-error" class="error-message"></span>
        </div>
      </div>
 
      <!-- Schedule Exam Button -->
      <div class="form-group">
        <button type="button" id="submitbutton">Schedule Exam</button>
      </div>
 
    </div>
    <!-- END schedule-card -->
 
    <!-- RIGHT: Scheduled Exams Viewer -->
    <div id="scheduled-exams">
 
      <h2 id="exams-heading">Your Scheduled Exams</h2>
 
      <!-- 3 exam slots — JS will populate these later -->
      <div class="exam-slot" id="exam-slot-1">
        <div class="exam-info">
          <span class="exam-label">Exam 1</span>
          <span class="exam-detail">No exam scheduled</span>
        </div>
        <button type="button" class="cancel-btn" disabled>Cancel</button>
      </div>
 
      <div class="exam-slot" id="exam-slot-2">
        <div class="exam-info">
          <span class="exam-label">Exam 2</span>
          <span class="exam-detail">No exam scheduled</span>
        </div>
        <button type="button" class="cancel-btn" disabled>Cancel</button>
      </div>
 
      <div class="exam-slot" id="exam-slot-3">
        <div class="exam-info">
          <span class="exam-label">Exam 3</span>
          <span class="exam-detail">No exam scheduled</span>
        </div>
        <button type="button" class="cancel-btn" disabled>Cancel</button>
      </div>
 
      <!-- Logout button pinned to bottom of panel -->
 
    </div>
    
     <div id="logout-row">
        <button type="button" id="logoutbutton">Log Out</button>
    </div>
    
    <!-- END scheduled-exams -->
 
  </main>
 
  <footer id="page-footer">
    <span>College of Southern Nevada</span>
  </footer>
 
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const classSelect = document.getElementById('class');
      const examSelect = document.getElementById('exam-name');
      const locationSelect = document.getElementById('location');
      const dateSelect = document.getElementById('date');
      const timeSelect = document.getElementById('time');

      const classGroup = document.getElementById('class-group');
      const examGroup = document.getElementById('exam-group');
      const locationGroup = document.getElementById('location-group');
      const dateGroup = document.getElementById('date-group');
      const timeGroup = document.getElementById('time-group');

      const classError = document.getElementById('class-error');
      const examError = document.getElementById('exam-error');
      const locationError = document.getElementById('location-error');
      const dateError = document.getElementById('date-error');
      const timeError = document.getElementById('time-error');

      const resetSelect = (select, placeholder) => {
        select.innerHTML = `<option value="">${placeholder}</option>`;
        select.disabled = true;
      };

      const clearError = (group, error) => {
        group.classList.remove('error');
        error.classList.remove('show');
        error.textContent = '';
      };

      const showError = (group, error, message) => {
        group.classList.add('error');
        error.classList.add('show');
        error.textContent = message;
      };

      const fetchJson = (url) => fetch(url, {
        method: 'GET',
        headers: { 'Content-Type': 'application/json' }
      }).then(r => r.json());

      fetchJson('http://localhost:5000/api/classes')
        .then(data => {
          if (data.success && data.classes) {
            classSelect.innerHTML = '<option value="">Select a Class</option>';
            data.classes.forEach(cls => {
              const option = document.createElement('option');
              option.value = cls.ClassID;
              option.textContent = cls.ClassName;
              classSelect.appendChild(option);
            });
          } else {
            classSelect.innerHTML = '<option value="">Unable to load classes</option>';
            console.error('Classes load failed:', data.message);
          }
        })
        .catch(err => {
          classSelect.innerHTML = '<option value="">Unable to load classes</option>';
          console.error('Error fetching classes:', err);
        });

      classSelect.addEventListener('change', () => {
        const classId = classSelect.value;
        clearError(classGroup, classError);
        resetSelect(examSelect, 'Select an Exam');
        resetSelect(locationSelect, 'Select an Exam First');
        resetSelect(dateSelect, 'Select a Campus First');
        resetSelect(timeSelect, 'Select a Date First');

        if (!classId) {
          showError(classGroup, classError, 'Please select a class');
          return;
        }

        fetchJson(`http://localhost:5000/api/exams?class_id=${classId}`)
          .then(data => {
            if (data.success && data.exams) {
              examSelect.innerHTML = '<option value="">Select an Exam</option>';
              if (data.exams.length === 0) {
                examSelect.innerHTML = '<option value="">No exams available</option>';
              } else {
                data.exams.forEach(exam => {
                  const option = document.createElement('option');
                  option.value = exam.ExamID;
                  option.textContent = exam.ExamName;
                  examSelect.appendChild(option);
                });
                examSelect.disabled = false;
              }
            } else {
              resetSelect(examSelect, 'Unable to load exams');
              console.error('Exam load failed:', data.message);
            }
          })
          .catch(err => {
            resetSelect(examSelect, 'Unable to load exams');
            console.error('Error fetching exams:', err);
          });
      });

      examSelect.addEventListener('change', () => {
        const classId = classSelect.value;
        const examId = examSelect.value;
        clearError(examGroup, examError);
        resetSelect(locationSelect, 'Select a Campus');
        resetSelect(dateSelect, 'Select a Campus First');
        resetSelect(timeSelect, 'Select a Date First');

        if (!examId) {
          showError(examGroup, examError, 'Please select an exam');
          return;
        }

        fetchJson(`http://localhost:5000/api/campuses?class_id=${classId}&exam_id=${examId}`)
          .then(data => {
            if (data.success && data.campuses) {
              locationSelect.innerHTML = '<option value="">Select a Campus</option>';
              if (data.campuses.length === 0) {
                locationSelect.innerHTML = '<option value="">No campuses available</option>';
              } else {
                data.campuses.forEach(campus => {
                  const option = document.createElement('option');
                  option.value = campus.LocationID;
                  option.textContent = campus.Campus;
                  option.dataset.campus   = campus.Campus;
                  option.dataset.building = campus.Building || '';
                  option.dataset.room     = campus.Room     || '';
                  locationSelect.appendChild(option);
                });
                locationSelect.disabled = false;
              }
            } else {
              resetSelect(locationSelect, 'Unable to load campuses');
              console.error('Campus load failed:', data.message);
            }
          })
          .catch(err => {
            resetSelect(locationSelect, 'Unable to load campuses');
            console.error('Error fetching campuses:', err);
          });
      });

      locationSelect.addEventListener('change', () => {
        const classId = classSelect.value;
        const examId = examSelect.value;
        const locationId = locationSelect.value;
        clearError(locationGroup, locationError);
        resetSelect(dateSelect, 'Select a Date');
        resetSelect(timeSelect, 'Select a Date First');

        if (!locationId) {
          showError(locationGroup, locationError, 'Please select a campus');
          return;
        }

        fetchJson(`http://localhost:5000/api/dates?class_id=${classId}&exam_id=${examId}&location_id=${locationId}`)
          .then(data => {
            if (data.success && data.dates) {
              dateSelect.innerHTML = '<option value="">Select a Date</option>';
              if (data.dates.length === 0) {
                dateSelect.innerHTML = '<option value="">No dates available</option>';
              } else {
                data.dates.forEach(item => {
                  const option = document.createElement('option');
                  option.value = item.SchedulesID;
                  option.dataset.date = item.exam_date;
                  const dateObj = new Date(item.exam_date + 'T00:00:00');
                  option.textContent = dateObj.toLocaleDateString('en-US', {
                    year: 'numeric', month: 'long', day: 'numeric'
                  });
                  dateSelect.appendChild(option);
                });
                dateSelect.disabled = false;
              }
            } else {
              resetSelect(dateSelect, 'Unable to load dates');
              console.error('Date load failed:', data.message);
            }
          })
          .catch(err => {
            resetSelect(dateSelect, 'Unable to load dates');
            console.error('Error fetching dates:', err);
          });
      });

      dateSelect.addEventListener('change', () => {
        const classId = classSelect.value;
        const examId = examSelect.value;
        const locationId = locationSelect.value;
        const scheduleId = dateSelect.value;
        clearError(dateGroup, dateError);
        resetSelect(timeSelect, 'Select a Time');

        if (!scheduleId) {
          showError(dateGroup, dateError, 'Please select a date');
          return;
        }

        fetchJson(`http://localhost:5000/api/times?class_id=${classId}&exam_id=${examId}&location_id=${locationId}&schedule_id=${scheduleId}`)
          .then(data => {
            if (data.success && data.times) {
              timeSelect.innerHTML = '<option value="">Select a Time</option>';
              if (data.times.length === 0) {
                timeSelect.innerHTML = '<option value="">No times available</option>';
              } else {
                data.times.forEach(item => {
                  const option = document.createElement('option');
                  option.value = item.SchedulesID;
                  option.dataset.time = item.exam_time;
                  const [hour, minute] = item.exam_time.split(':');
                  const hourInt = parseInt(hour, 10);
                  const ampm = hourInt >= 12 ? 'PM' : 'AM';
                  const displayHour = hourInt % 12 || 12;
                  option.textContent = `${displayHour}:${minute} ${ampm}`;
                  timeSelect.appendChild(option);
                });
                timeSelect.disabled = false;
              }
            } else {
              resetSelect(timeSelect, 'Unable to load times');
              console.error('Time load failed:', data.message);
            }
          })
          .catch(err => {
            resetSelect(timeSelect, 'Unable to load times');
            console.error('Error fetching times:', err);
          });
      });

      timeSelect.addEventListener('change', () => {
        clearError(timeGroup, timeError);
      });
    });

    document.getElementById('submitbutton').addEventListener('click', () => {
        let valid = true;
        if (!classSelect.value)    { showError(classGroup, classError, 'Please select a class'); valid = false; }
        if (!locationSelect.value) { showError(locationGroup, locationError, 'Please select a campus'); valid = false; }
        if (!dateSelect.value)     { showError(dateGroup, dateError, 'Please select a date'); valid = false; }
        if (!timeSelect.value)     { showError(timeGroup, timeError, 'Please select a time'); valid = false; }
        if (!valid) return;

        const locOpt   = locationSelect.options[locationSelect.selectedIndex];
        const dateOpt  = dateSelect.options[dateSelect.selectedIndex];
        const timeOpt  = timeSelect.options[timeSelect.selectedIndex];
        const classOpt = classSelect.options[classSelect.selectedIndex];

        const userId   = localStorage.getItem('user_id');
        const username = localStorage.getItem('username');
        if (!userId) { alert('You must be logged in.'); window.location.href = 'login.html'; return; }

        fetch('http://localhost:5000/api/schedule', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            user_id:  parseInt(userId),
            date:     dateOpt.dataset.date,
            time:     timeOpt.dataset.time,
            location: locOpt.dataset.campus,
            building: locOpt.dataset.building,
            room:     locOpt.dataset.room,
            subject:  classOpt.textContent,
            proctor:  ''
          })
        })
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            const reg = data.registration;
            const params = new URLSearchParams({
              studentName: username || '',
              email:       username || '',
              exam:        reg.subject,
              examDate:    reg.date,
              examTime:    reg.time,
              location:    reg.location + (reg.building ? ' — ' + reg.building + ' Room ' + reg.room : '')
            });
            window.location.href = 'confirmation%20(1).html?' + params.toString();
          } else {
            alert('Error: ' + data.message);
          }
        })
        .catch(err => { console.error(err); alert('Network or server error'); });
      });

      document.getElementById('logoutbutton').addEventListener('click', () => {
      fetch('http://localhost:5000/api/logout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include'
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          localStorage.removeItem('username');
          localStorage.removeItem('user_id');
          window.location.href = 'login.html';
        } else {
          alert('Error: ' + data.message);
        }
      })
      .catch(err => { console.error(err); alert('Network or server error'); });
    });

    document.getElementById('submitbutton').addEventListener('click', () => {
      const classSelect = document.getElementById('class');
      const examSelect = document.getElementById('exam-name');
      const locationSelect = document.getElementById('location');
      const dateSelect = document.getElementById('date');
      const timeSelect = document.getElementById('time');

      const classId = classSelect.value;
      const examId = examSelect.value;
      const locationId = locationSelect.value;
      const scheduleId = dateSelect.value;
      const timeValue = timeSelect.value;

      if (!classId || !examId || !locationId || !scheduleId || !timeValue) {
        alert('Please select all required fields.');
        return;
      }

      const userId = localStorage.getItem('user_id');
      if (!userId) {
        alert('User not logged in. Please log in again.');
        window.location.href = 'login.html';
        return;
      }

      // Get the selected values for display
      const className = classSelect.options[classSelect.selectedIndex].text;
      const examName = examSelect.options[examSelect.selectedIndex].text;
      const locationName = locationSelect.options[locationSelect.selectedIndex].text;
      const dateValue = dateSelect.options[dateSelect.selectedIndex].text;
      const timeDisplay = timeSelect.options[timeSelect.selectedIndex].text;

      // Call the schedule exam API
      fetch('http://localhost:5000/api/schedule', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({
          user_id: userId,
          exam_id: examId
        })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          // Redirect to confirmation with all details
          const params = new URLSearchParams({
            studentName: localStorage.getItem('username') || 'Student',
            email: localStorage.getItem('username') + '@student.csn.edu',
            subject: data.registration.subject,
            exam: examName,
            examDate: dateValue,
            examTime: timeDisplay,
            location: locationName,
            building: data.registration.building,
            room: data.registration.room
          });
          window.location.href = 'confirmation (1).html?' + params.toString();
        } else {
          alert('Error: ' + data.message);
        }
      })
      .catch(err => { console.error(err); alert('Network or server error'); });
    });
  </script>

</body>
</html>
