<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link href="styleslogin.css" rel="stylesheet" type="text/css">
        <title>Test Page I guess</title>
    </head>
    <body>
        <h1 type="text" id="title">exam registration </h1>
        <!-- backend handled by Flask server; communication via fetch -->
        
        <div id="login-card">
            <label for="user">Username: </label>
            <input
            type="text"
            id="user"
            name="user">
            <label for="password">Password: </label>
            <input
            type="password"
            id="password"
            name="password">
            <button type="button" id="loginbutton">login</button>
            <a href="temp"> Forgot Username or Password? </a>
        </div>
        <script>
          // send login info to Flask backend
          document.getElementById('loginbutton').addEventListener('click', () => {
            const username = document.getElementById('user').value;
            const password = document.getElementById('password').value;
            fetch('http://localhost:5000/api/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username, password })
            })
            .then(resp => resp.json())
            .then(data => {
              if (data.success) {
                alert('Login successful!');
                // TODO: redirect or process user data
              } else {
                alert('Error: ' + data.message);
              }
            })
            .catch(err => {
              console.error(err);
              alert('Network or server error');
            });
          });
        </script>
    </body>
</html>
