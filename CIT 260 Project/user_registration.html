<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="stylesregistration.css" rel="stylesheet" type="text/css">
  <title>CSN — User Registration</title>
</head>
<body>
 
  <h1 id="title">Exam Registration — Create Account</h1>
 
  <div id="login-card">
 
    <label for="username">Username:</label>
    <input
      type="text"
      id="username"
      name="username"
      placeholder="NSHEID@student.csn.edu" />
 
    <label for="first_password">Password:</label>
    <input
      type="password"
      id="first_password"
      name="first_password"
      placeholder="Create a password" />
 
    <label for="second_password">Confirm Password:</label>
    <input
      type="password"
      id="second_password"
      name="second_password"
      placeholder="Re-enter your password" />
 
    <button type="button" id="registerbutton">Create Account</button>
 
    <a href="login.html">Already have an account? Log in here.</a>
 
  </div>
 
  <script>
    // Backend handled by Flask server; communication via fetch
    document.getElementById('registerbutton').addEventListener('click', () => {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('first_password').value;
      const confirm = document.getElementById('second_password').value;

      if (!username || !password) {
        alert('Username and password are required.');
        return;
      }

      if (password !== confirm) {
        alert('Passwords do not match!');
        return;
      }

      fetch('http://localhost:5000/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
      .then(resp => resp.json().then(data => ({ status: resp.status, body: data })))
      .then(({ status, body }) => {
        if (body.success) {
          alert('Account created successfully! Please log in.');
          window.location.href = 'login.html';
        } else {
          alert('Error: ' + body.message);
        }
      })
      .catch(err => {
        console.error(err);
        alert('Network or server error');
      });
    });
  </script>
 
</body>
</html>
